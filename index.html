<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>炭火小巷烧烤</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #f6f1ea;
      --paper: #fffaf3;
      --ink: #241b16;
      --muted: #7d7068;
      --line: #eadccd;
      --brand: #d74722;
      --brand-dark: #9e2c16;
      --dark: #171210;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #fff8ef 0%, var(--bg) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button, input, textarea, select { font: inherit; }

    .app {
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 14px 92px;
    }

    .hero {
      position: relative;
      min-height: 232px;
      overflow: hidden;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(18, 12, 8, .92), rgba(18, 12, 8, .25)),
        radial-gradient(circle at 70% 20%, rgba(236, 133, 49, .55), transparent 28%),
        linear-gradient(135deg, #211411, #582115 48%, #120d0b);
    }

    .grill {
      position: absolute;
      right: -22px;
      bottom: 22px;
      width: 270px;
      height: 118px;
      transform: rotate(-7deg);
      border-radius: 14px;
      background: linear-gradient(180deg, #30201a, #090706);
      box-shadow: 0 20px 38px rgba(0, 0, 0, .35);
    }

    .grill::before {
      content: "";
      position: absolute;
      inset: 20px 18px;
      background: repeating-linear-gradient(90deg, transparent 0 19px, rgba(255,255,255,.34) 20px 22px);
      opacity: .85;
    }

    .ember {
      position: absolute;
      inset: 64px 24px 16px;
      border-radius: 999px;
      background: radial-gradient(circle, #ff7c2e 0 10%, #9d2618 34%, transparent 66%);
      filter: blur(3px);
    }

    .skewer {
      position: absolute;
      left: 18px;
      width: 230px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #c7935f 0 8%, #814227 8% 18%, #d4863f 18% 29%, #5c281c 29% 40%, #d4863f 40% 50%, #6b2f20 50% 62%, #d4863f 62% 72%, #7b3925 72% 84%, #c7935f 84%);
      box-shadow: 0 3px 0 rgba(0,0,0,.28);
    }

    .skewer:nth-child(2) { top: 32px; }
    .skewer:nth-child(3) { top: 54px; left: 10px; }
    .skewer:nth-child(4) { top: 76px; left: 30px; }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 232px;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
      color: #fffaf4;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 10px;
      color: #f7d5bd;
      font-size: 15px;
    }

    .meta {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat,
    .notice,
    .card,
    .table-banner,
    .order-result,
    .shop {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .stat {
      padding: 12px 6px;
      text-align: center;
    }

    .stat strong {
      display: block;
      color: var(--brand);
      font-size: 22px;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .notice {
      margin-top: 12px;
      padding: 14px;
      color: #fffaf4;
      border-color: #241b16;
      background: #241b16;
    }

    .notice b { display: block; margin-bottom: 6px; }
    .notice p { margin: 0; color: #ecd7c7; font-size: 14px; line-height: 1.55; }

    .table-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding: 12px 14px;
    }

    .table-banner strong {
      display: block;
      font-size: 18px;
    }

    .table-banner span {
      color: var(--muted);
      font-size: 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 10px;
      font-size: 20px;
      font-weight: 900;
    }

    .section-title small {
      color: var(--brand);
      font-size: 13px;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      min-width: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 14px;
      color: #6d5f56;
      background: var(--paper);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .tab.active {
      border-color: var(--brand);
      color: #fff;
      background: var(--brand);
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .card {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 12px;
      padding: 12px;
    }

    .icon {
      display: grid;
      width: 62px;
      height: 62px;
      place-items: center;
      border-radius: 8px;
      background: #fff0df;
      font-size: 30px;
    }

    .dish-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dish-name {
      font-size: 16px;
      font-weight: 900;
    }

    .badge {
      border-radius: 5px;
      padding: 2px 6px;
      color: var(--brand);
      background: #ffe7d8;
      font-size: 11px;
      font-weight: 900;
    }

    .desc {
      min-height: 36px;
      margin: 5px 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .price {
      color: var(--brand);
      font-size: 18px;
      font-weight: 900;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      color: #fff;
      background: var(--brand);
      font-size: 14px;
      font-weight: 900;
    }

    button:disabled {
      opacity: .55;
    }

    .shop {
      margin-top: 22px;
      padding: 18px;
    }

    .shop h2 {
      margin: 0;
      font-size: 24px;
    }

    .shop p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .cart-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 5;
      padding: 10px 14px max(10px, env(safe-area-inset-bottom));
      background: rgba(255,250,244,.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .cart-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-width: 520px;
      margin: 0 auto;
      align-items: center;
    }

    .cart-total {
      font-size: 14px;
      color: var(--muted);
    }

    .cart-total b {
      color: var(--brand);
      font-size: 20px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: flex-end;
      background: rgba(0,0,0,.35);
    }

    .modal.show { display: flex; }

    .modal.center {
      align-items: center;
      padding: 16px;
    }

    .sheet {
      width: 100%;
      max-width: 520px;
      max-height: 86vh;
      margin: 0 auto;
      overflow: auto;
      border-radius: 12px 12px 0 0;
      background: var(--paper);
      padding: 18px 14px calc(18px + env(safe-area-inset-bottom));
    }

    .center .sheet {
      border-radius: 12px;
      max-height: 90vh;
      padding-bottom: 18px;
    }

    .table-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .table-btn {
      aspect-ratio: 1;
      padding: 0;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      font-size: 17px;
    }

    .table-btn.active {
      color: #fff;
      border-color: var(--brand);
      background: var(--brand);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stepper button {
      width: 30px;
      height: 30px;
      padding: 0;
      background: var(--dark);
    }

    .order-form {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .order-form input,
    .order-form textarea,
    .order-form select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .order-form textarea {
      min-height: 72px;
      resize: vertical;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .secondary { color: var(--ink); background: #efe4d8; }

    .order-result {
      margin-top: 12px;
      padding: 12px;
      background: #fff;
    }

    .result-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .result-line:last-child { border-bottom: 0; }

    .full-actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 88px;
      z-index: 30;
      width: min(92vw, 460px);
      transform: translateX(-50%);
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      background: var(--dark);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="grill">
        <div class="skewer"></div>
        <div class="skewer"></div>
        <div class="skewer"></div>
        <div class="ember"></div>
      </div>
      <div class="hero-content">
        <h1>炭火小巷</h1>
        <div class="tagline">现烤串烧 · 夜宵小聚 · 扫码点单</div>
        <div class="meta"><span>营业中</span><span>17:00-02:00</span></div>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><strong>4.9</strong><span>门店评分</span></div>
      <div class="stat"><strong>28</strong><span>招牌菜品</span></div>
      <div class="stat"><strong>3km</strong><span>配送范围</span></div>
    </section>

    <section class="notice">
      <b>今晚推荐</b>
      <p>双人烧烤套餐含羊肉串、牛油小串、烤茄子和冰粉。下单后商家后台会实时收到订单。</p>
    </section>

    <section class="table-banner">
      <div>
        <strong id="tableLabel">请选择桌号</strong>
        <span>堂食扫码点餐，先选桌号再下单</span>
      </div>
      <button class="secondary" id="changeTableBtn">换桌</button>
    </section>

    <div class="section-title">
      <span>菜单点单</span>
      <small>堂食扫码点餐</small>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <section class="list" id="dishList"></section>

    <section class="shop">
      <h2>门店信息</h2>
      <p>地址：城市夜市街 18 号 A 座 1F</p>
      <p>电话：138-0000-6688</p>
      <p>活动：双人夜宵套餐 ¥98，满 88 减 12。</p>
    </section>
  </main>

  <div class="cart-bar">
    <div class="cart-inner">
      <div class="cart-total">已选 <span id="cartCount">0</span> 份 · 合计 <b id="cartTotal">¥0</b></div>
      <button id="openCart">查看购物车</button>
    </div>
  </div>

  <div class="modal" id="cartModal">
    <div class="sheet">
      <div class="section-title" style="margin-top:0">
        <span>购物车</span>
        <button class="secondary" id="closeCart">关闭</button>
      </div>
      <div id="cartItems"></div>
      <form class="order-form" id="orderForm">
        <input id="customerName" autocomplete="name" placeholder="姓名 / 称呼（可不填）">
        <input id="customerPhone" autocomplete="tel" inputmode="tel" placeholder="手机号（可不填）">
        <textarea id="orderNote" placeholder="备注，例如少辣、加孜然、不要香菜"></textarea>
        <div class="actions">
          <button type="button" class="secondary" id="clearCart">清空</button>
          <button type="submit" id="submitOrder">提交订单</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal center show" id="tableModal">
    <div class="sheet">
      <div class="section-title" style="margin-top:0">
        <span>选择桌号</span>
        <small>1-15 号桌</small>
      </div>
      <p style="margin:0;color:var(--muted);line-height:1.55">请选择你现在就坐的桌号，商家后台会按桌号出单。</p>
      <div class="table-grid" id="tableGrid"></div>
    </div>
  </div>

  <div class="modal center" id="resultModal">
    <div class="sheet">
      <div class="section-title" style="margin-top:0">
        <span>已下单</span>
        <small id="resultTable">--</small>
      </div>
      <div class="order-result" id="resultItems"></div>
      <div class="full-actions">
        <button id="callWaiterBtn">呼叫服务员</button>
        <button class="secondary" id="continueOrderBtn">继续点单</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const categories = [
      { id: "all", name: "全部" },
      { id: "skewer", name: "串烧" },
      { id: "veg", name: "素烤" },
      { id: "snack", name: "小食" },
      { id: "drink", name: "饮品" }
    ];

    const dishes = [
      { id: "lamb", category: "skewer", name: "炭烤羊肉串", desc: "肥瘦相间，孜然和辣椒现撒", price: 18, icon: "羊", badge: "招牌" },
      { id: "beef", category: "skewer", name: "牛油小串", desc: "外焦里嫩，一口爆汁", price: 16, icon: "牛", badge: "热卖" },
      { id: "wing", category: "skewer", name: "蜜汁鸡翅", desc: "甜辣酱汁腌制，皮脆肉嫩", price: 24, icon: "翅" },
      { id: "shrimp", category: "skewer", name: "蒜香烤虾", desc: "开背烤制，蒜香和炭香很足", price: 32, icon: "虾" },
      { id: "eggplant", category: "veg", name: "蒜蓉烤茄子", desc: "蒜香浓郁，铺满粉丝", price: 22, icon: "茄", badge: "必点" },
      { id: "corn", category: "veg", name: "黄油烤玉米", desc: "甜糯玉米刷黄油和海盐", price: 12, icon: "米" },
      { id: "tofu", category: "snack", name: "锡纸豆腐", desc: "嫩豆腐配小米辣和香葱", price: 18, icon: "腐" },
      { id: "ice", category: "snack", name: "红糖冰粉", desc: "解辣清爽，花生碎和葡萄干", price: 10, icon: "冰" },
      { id: "soda", category: "drink", name: "冰镇汽水", desc: "烧烤经典搭配，整瓶冰镇", price: 6, icon: "饮" }
    ];

    const config = window.BBQ_CONFIG || {};
    const dbReady = Boolean(config.SUPABASE_URL && config.SUPABASE_ANON_KEY);
    const db = dbReady ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY) : null;

    let active = "all";
    const cart = new Map();
    const tabs = document.querySelector("#tabs");
    const dishList = document.querySelector("#dishList");
    const cartCount = document.querySelector("#cartCount");
    const cartTotal = document.querySelector("#cartTotal");
    const cartModal = document.querySelector("#cartModal");
    const cartItems = document.querySelector("#cartItems");
    const tableModal = document.querySelector("#tableModal");
    const tableGrid = document.querySelector("#tableGrid");
    const tableLabel = document.querySelector("#tableLabel");
    const resultModal = document.querySelector("#resultModal");
    const resultItems = document.querySelector("#resultItems");
    const resultTable = document.querySelector("#resultTable");
    const toast = document.querySelector("#toast");
    const submitOrder = document.querySelector("#submitOrder");
    let selectedTable = "";
    let lastOrder = null;

    function money(value) {
      return `¥${value}`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function orderNo() {
      const date = new Date();
      const time = `${date.getHours()}${date.getMinutes()}${date.getSeconds()}`.padStart(6, "0");
      return `BBQ${time}${Math.floor(Math.random() * 90 + 10)}`;
    }

    function renderTables() {
      tableGrid.innerHTML = Array.from({ length: 15 }, (_, index) => {
        const tableNo = String(index + 1);
        return `<button class="table-btn ${selectedTable === tableNo ? "active" : ""}" data-table="${tableNo}">${tableNo}</button>`;
      }).join("");
    }

    function selectTable(tableNo) {
      selectedTable = tableNo;
      tableLabel.textContent = `${tableNo} 号桌`;
      tableModal.classList.remove("show");
      renderTables();
      showToast(`已选择 ${tableNo} 号桌`);
    }

    function renderTabs() {
      tabs.innerHTML = categories.map(item => (
        `<button class="tab ${item.id === active ? "active" : ""}" data-id="${item.id}">${item.name}</button>`
      )).join("");
    }

    function renderDishes() {
      const visible = active === "all" ? dishes : dishes.filter(item => item.category === active);
      dishList.innerHTML = visible.map(item => `
        <article class="card">
          <div class="icon">${item.icon}</div>
          <div>
            <div class="dish-head">
              <span class="dish-name">${item.name}</span>
              ${item.badge ? `<span class="badge">${item.badge}</span>` : ""}
            </div>
            <p class="desc">${item.desc}</p>
            <div class="row">
              <span class="price">${money(item.price)}</span>
              <button data-add="${item.id}">加入</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function totals() {
      let count = 0;
      let total = 0;
      for (const item of cart.values()) {
        count += item.count;
        total += item.count * item.price;
      }
      return { count, total };
    }

    function renderCart() {
      const { count, total } = totals();
      cartCount.textContent = count;
      cartTotal.textContent = money(total);
      if (!count) {
        cartItems.innerHTML = `<p style="color:var(--muted);text-align:center;padding:22px 0">购物车还是空的，先加几串。</p>`;
        return;
      }
      cartItems.innerHTML = [...cart.values()].map(item => `
        <div class="cart-item">
          <div>
            <b>${item.icon} ${item.name}</b>
            <div style="color:var(--muted);font-size:13px;margin-top:5px">${money(item.price)} / 份</div>
          </div>
          <div class="stepper">
            <button type="button" data-dec="${item.id}">-</button>
            <strong>${item.count}</strong>
            <button type="button" data-inc="${item.id}">+</button>
          </div>
        </div>
      `).join("");
    }

    function add(id) {
      const dish = dishes.find(item => item.id === id);
      const existing = cart.get(id);
      cart.set(id, { ...dish, count: existing ? existing.count + 1 : 1 });
      renderCart();
      showToast(`已加入 ${dish.name}`);
    }

    async function createOrder(event) {
      event.preventDefault();
      const { count, total } = totals();
      if (!count) {
        showToast("购物车还是空的。");
        return;
      }
      if (!selectedTable) {
        tableModal.classList.add("show");
        showToast("请先选择桌号。");
        return;
      }
      if (!dbReady) {
        showToast("订单系统还没配置 Supabase。");
        return;
      }

      submitOrder.disabled = true;
      submitOrder.textContent = "提交中...";

      const items = [...cart.values()].map(item => ({
        id: item.id,
        name: item.name,
        price: item.price,
        count: item.count,
        subtotal: item.price * item.count
      }));
      const payload = {
        order_no: orderNo(),
        customer_name: document.querySelector("#customerName").value.trim() || `${selectedTable}号桌客人`,
        phone: document.querySelector("#customerPhone").value.trim() || "-",
        dining_type: `堂食 ${selectedTable}号桌`,
        note: document.querySelector("#orderNote").value.trim(),
        items,
        total,
        status: "new"
      };

      const { error } = await db.from("orders").insert(payload);
      submitOrder.disabled = false;
      submitOrder.textContent = "提交订单";

      if (error) {
        showToast(`提交失败：${error.message}`);
        return;
      }

      lastOrder = payload;
      cart.clear();
      renderCart();
      cartModal.classList.remove("show");
      event.target.reset();
      renderResult(payload);
      resultModal.classList.add("show");
      showToast(`订单已提交：${payload.order_no}`);
    }

    function renderResult(order) {
      resultTable.textContent = `${selectedTable} 号桌`;
      resultItems.innerHTML = `
        <div class="result-line"><strong>订单号</strong><span>${order.order_no}</span></div>
        ${order.items.map(item => `<div class="result-line"><span>${item.name} x ${item.count}</span><strong>${money(item.subtotal)}</strong></div>`).join("")}
        <div class="result-line"><strong>合计</strong><strong>${money(order.total)}</strong></div>
      `;
    }

    async function callWaiter() {
      if (!selectedTable) {
        tableModal.classList.add("show");
        showToast("请先选择桌号。");
        return;
      }
      if (!dbReady) {
        showToast("订单系统还没配置 Supabase。");
        return;
      }
      const button = document.querySelector("#callWaiterBtn");
      button.disabled = true;
      button.textContent = "呼叫中...";
      const payload = {
        order_no: `CALL${Date.now().toString().slice(-6)}`,
        customer_name: `${selectedTable}号桌客人`,
        phone: "-",
        dining_type: `堂食 ${selectedTable}号桌`,
        note: `${selectedTable}号桌呼叫服务员`,
        items: [{ id: "call-waiter", name: "呼叫服务员", price: 0, count: 1, subtotal: 0 }],
        total: 0,
        status: "new"
      };
      const { error } = await db.from("orders").insert(payload);
      button.disabled = false;
      button.textContent = "呼叫服务员";
      showToast(error ? `呼叫失败：${error.message}` : "已呼叫服务员");
    }

    tabs.addEventListener("click", event => {
      const id = event.target.dataset.id;
      if (!id) return;
      active = id;
      renderTabs();
      renderDishes();
    });

    dishList.addEventListener("click", event => {
      const id = event.target.dataset.add;
      if (id) add(id);
    });

    cartItems.addEventListener("click", event => {
      const inc = event.target.dataset.inc;
      const dec = event.target.dataset.dec;
      const id = inc || dec;
      if (!id) return;
      const item = cart.get(id);
      item.count += inc ? 1 : -1;
      if (item.count <= 0) cart.delete(id);
      renderCart();
    });

    document.querySelector("#openCart").addEventListener("click", () => {
      if (!selectedTable) {
        tableModal.classList.add("show");
        showToast("请先选择桌号。");
        return;
      }
      renderCart();
      cartModal.classList.add("show");
    });

    tableGrid.addEventListener("click", event => {
      const tableNo = event.target.dataset.table;
      if (tableNo) selectTable(tableNo);
    });
    document.querySelector("#changeTableBtn").addEventListener("click", () => tableModal.classList.add("show"));
    document.querySelector("#callWaiterBtn").addEventListener("click", callWaiter);
    document.querySelector("#continueOrderBtn").addEventListener("click", () => resultModal.classList.remove("show"));
    document.querySelector("#closeCart").addEventListener("click", () => cartModal.classList.remove("show"));
    document.querySelector("#clearCart").addEventListener("click", () => { cart.clear(); renderCart(); });
    document.querySelector("#orderForm").addEventListener("submit", createOrder);

    renderTabs();
    renderDishes();
    renderCart();
    renderTables();
  </script>
</body>
</html>
