<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>炭火小巷商家后台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #1f2328;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #d74722;
      --ok: #15803d;
      --warn: #b45309;
      --bad: #b91c1c;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .panel,
    .order {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .login {
      max-width: 360px;
      margin: 12vh auto;
      padding: 22px;
    }

    .login input {
      width: 100%;
      margin: 14px 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      color: #fff;
      background: var(--brand);
      font-weight: 800;
    }

    button.secondary {
      color: var(--ink);
      background: #eef0f3;
    }

    button.ok { background: var(--ok); }
    button.bad { background: var(--bad); }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .main-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .main-tab {
      color: var(--muted);
      background: #eef0f3;
    }

    .main-tab.active {
      color: #fff;
      background: #1f2328;
    }

    .menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .menu-form {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
      padding: 14px;
    }

    .field {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .field.wide { grid-column: span 2; }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--ink);
      background: #fff;
    }

    .field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      align-items: end;
      gap: 8px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .menu-card {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .menu-card.off { opacity: .58; }

    .menu-icon {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border-radius: 6px;
      color: #fff;
      background: #9e432c;
      font-size: 26px;
      font-weight: 900;
    }

    .menu-name { font-size: 16px; font-weight: 900; }
    .menu-desc { margin-top: 4px; color: var(--muted); font-size: 12px; }
    .menu-price { margin-top: 7px; color: var(--brand); font-weight: 900; }
    .menu-actions { display: grid; gap: 7px; }
    .menu-actions button { min-width: 68px; }

    .pill {
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      background: #eef0f3;
      font-size: 13px;
      font-weight: 800;
    }

    .pill.active {
      color: #fff;
      background: var(--brand);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .order {
      padding: 14px;
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .order-no {
      font-size: 18px;
      font-weight: 900;
    }

    .status {
      border-radius: 999px;
      padding: 4px 9px;
      color: #fff;
      background: var(--warn);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status.accepted { background: #2563eb; }
    .status.done { background: var(--ok); }
    .status.cancelled { background: var(--bad); }

    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .meta b {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 3px;
    }

    .items {
      display: grid;
      gap: 6px;
      margin: 12px 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #374151;
      font-size: 14px;
    }

    .total {
      color: var(--brand);
      font-size: 18px;
      font-weight: 900;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .empty {
      padding: 36px 16px;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      background: #111827;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .toast.show { opacity: 1; }

    @media (max-width: 720px) {
      header { align-items: flex-start; flex-direction: column; }
      .meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .wrap { padding: 12px; }
      .menu-form { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field.wide { grid-column: span 2; }
      .menu-grid { grid-template-columns: 1fr; }
      .menu-card { grid-template-columns: 54px 1fr; }
      .menu-icon { width: 54px; height: 54px; }
      .menu-actions { grid-column: 1 / -1; grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <section class="panel login" id="login">
    <h1>商家后台</h1>
    <div class="sub">输入后台密码查看订单</div>
    <input id="pin" type="password" inputmode="numeric" placeholder="后台密码">
    <button id="loginBtn">进入后台</button>
  </section>

  <main class="wrap" id="app" hidden>
    <header>
      <div>
        <h1>炭火小巷商家后台</h1>
        <div class="sub" id="summary">正在加载订单</div>
      </div>
      <div class="toolbar">
        <button class="secondary" id="refreshBtn">刷新</button>
        <button class="secondary" id="soundBtn">声音已开</button>
      </div>
    </header>

    <nav class="main-tabs" id="mainTabs">
      <button class="main-tab active" data-view="orders">订单管理</button>
      <button class="main-tab" data-view="menu">菜品管理</button>
    </nav>

    <section id="ordersView">
      <nav class="toolbar" id="filters">
        <button class="pill active" data-status="all">全部</button>
        <button class="pill" data-status="new">新订单</button>
        <button class="pill" data-status="accepted">已接单</button>
        <button class="pill" data-status="done">已完成</button>
        <button class="pill" data-status="cancelled">已取消</button>
      </nav>
      <section class="grid" id="orders"></section>
    </section>

    <section id="menuView" hidden>
      <div class="menu-head">
        <div>
          <h2 style="margin:0;font-size:19px">菜品管理</h2>
          <div class="sub" id="menuSummary">正在加载菜品</div>
        </div>
        <button id="addMenuBtn">新增菜品</button>
      </div>

      <section class="panel menu-form" id="menuForm" hidden>
        <input type="hidden" id="menuId">
        <label class="field">菜品名称<input id="menuName" maxlength="30" placeholder="例如：烤羊肉串"></label>
        <label class="field">价格（元）<input id="menuPrice" type="number" min="0" step="1" placeholder="18"></label>
        <label class="field">分类
          <select id="menuCategory">
            <option value="skewer">串烧</option>
            <option value="veg">素烤</option>
            <option value="snack">小食</option>
            <option value="drink">饮品</option>
          </select>
        </label>
        <label class="field">显示顺序<input id="menuSort" type="number" min="0" step="1" value="100"></label>
        <label class="field">菜品图标字<input id="menuIcon" maxlength="2" placeholder="烤"></label>
        <label class="field">角标<input id="menuBadge" maxlength="6" placeholder="招牌/热卖"></label>
        <label class="field wide">菜品介绍<textarea id="menuDescription" maxlength="100" placeholder="简单介绍口味和特点"></textarea></label>
        <div class="form-actions">
          <button id="saveMenuBtn">保存菜品</button>
          <button class="secondary" id="cancelMenuBtn">取消</button>
        </div>
      </section>

      <section class="menu-grid" id="menuItems"></section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const config = window.BBQ_CONFIG || {};
    const statusText = {
      new: "新订单",
      accepted: "已接单",
      done: "已完成",
      cancelled: "已取消"
    };

    const dbReady = Boolean(config.SUPABASE_URL && config.SUPABASE_ANON_KEY);
    const db = dbReady ? window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY) : null;
    const login = document.querySelector("#login");
    const app = document.querySelector("#app");
    const ordersEl = document.querySelector("#orders");
    const ordersView = document.querySelector("#ordersView");
    const menuView = document.querySelector("#menuView");
    const menuItemsEl = document.querySelector("#menuItems");
    const menuSummary = document.querySelector("#menuSummary");
    const menuForm = document.querySelector("#menuForm");
    const summary = document.querySelector("#summary");
    const toast = document.querySelector("#toast");
    let allOrders = [];
    let currentStatus = "all";
    let soundEnabled = true;
    let ordersLoadedOnce = false;
    let refreshTimer = null;
    let audioCtx = null;
    let currentView = "orders";
    let allMenuItems = [];

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function money(value) {
      return `¥${Number(value || 0).toFixed(0)}`;
    }

    function fmtTime(value) {
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      })[char]);
    }

    function unlockSound() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function speakNewOrder() {
      if (!soundEnabled) return;
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("来单了");
        utterance.lang = "zh-CN";
        utterance.rate = 1;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
      }
    }

    function beep() {
      if (!soundEnabled) return;
      unlockSound();
      const ctx = audioCtx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 880;
      gain.gain.value = .08;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      window.setTimeout(() => osc.stop(), 260);
    }

    function notifyNewOrder(orderNo) {
      beep();
      speakNewOrder();
      showToast(`新订单：${orderNo}`);
    }

    function visibleOrders() {
      return currentStatus === "all" ? allOrders : allOrders.filter(order => order.status === currentStatus);
    }

    function render() {
      const visible = visibleOrders();
      const newCount = allOrders.filter(order => order.status === "new").length;
      summary.textContent = `共 ${allOrders.length} 单，新订单 ${newCount} 单`;
      if (!visible.length) {
        ordersEl.innerHTML = `<div class="panel empty">暂无订单</div>`;
        return;
      }
      ordersEl.innerHTML = visible.map(order => {
        const items = Array.isArray(order.items) ? order.items : [];
        return `
          <article class="order">
            <div class="order-top">
              <div>
                <div class="order-no">${order.order_no}</div>
                <div class="sub">${fmtTime(order.created_at)}</div>
              </div>
              <span class="status ${order.status}">${statusText[order.status] || order.status}</span>
            </div>
            <div class="meta">
              <div><b>${order.customer_name}</b>顾客</div>
              <div><b>${order.phone}</b>电话</div>
              <div><b>${order.dining_type}</b>方式</div>
              <div><b class="total">${money(order.total)}</b>合计</div>
            </div>
            <div class="items">
              ${items.map(item => `<div class="item"><span>${item.name} x ${item.count}</span><b>${money(item.subtotal)}</b></div>`).join("")}
            </div>
            ${order.note ? `<div class="sub">备注：${order.note}</div>` : ""}
            <div class="actions">
              <button class="ok" data-action="accepted" data-id="${order.id}">接单</button>
              <button data-action="done" data-id="${order.id}">完成</button>
              <button class="bad" data-action="cancelled" data-id="${order.id}">取消</button>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadOrders() {
      if (!dbReady) {
        ordersEl.innerHTML = `<div class="panel empty">还没有配置 Supabase URL 和 anon key。</div>`;
        summary.textContent = "订单系统未配置";
        return;
      }
      const { data, error } = await db
        .from("orders")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(100);
      if (error) {
        ordersEl.innerHTML = `<div class="panel empty">读取失败：${error.message}</div>`;
        return;
      }
      const nextOrders = data || [];
      if (ordersLoadedOnce) {
        const existingIds = new Set(allOrders.map(order => order.id));
        const newOrders = nextOrders.filter(order => !existingIds.has(order.id));
        if (newOrders.length) {
          notifyNewOrder(newOrders[0].order_no);
        }
      }
      allOrders = nextOrders;
      ordersLoadedOnce = true;
      render();
    }

    async function updateStatus(id, status) {
      const { error } = await db.from("orders").update({ status }).eq("id", id);
      if (error) {
        showToast(`更新失败：${error.message}`);
        return;
      }
      allOrders = allOrders.map(order => order.id === id ? { ...order, status } : order);
      render();
    }

    function renderMenu() {
      const activeCount = allMenuItems.filter(item => item.active).length;
      menuSummary.textContent = `共 ${allMenuItems.length} 个菜品，已上架 ${activeCount} 个`;
      if (!allMenuItems.length) {
        menuItemsEl.innerHTML = `<div class="panel empty">暂无菜品，点击“新增菜品”开始添加</div>`;
        return;
      }
      menuItemsEl.innerHTML = allMenuItems.map(item => `
        <article class="menu-card ${item.active ? "" : "off"}">
          <div class="menu-icon">${escapeHtml(item.icon || "烤")}</div>
          <div>
            <div class="menu-name">${escapeHtml(item.name)} ${item.badge ? `<span class="status">${escapeHtml(item.badge)}</span>` : ""}</div>
            <div class="menu-desc">${escapeHtml(item.description || "暂无介绍")}</div>
            <div class="menu-price">${money(item.price)} · ${item.active ? "已上架" : "已下架"}</div>
          </div>
          <div class="menu-actions">
            <button class="secondary" data-menu-action="edit" data-id="${escapeHtml(item.id)}">修改</button>
            <button class="${item.active ? "bad" : "ok"}" data-menu-action="toggle" data-id="${escapeHtml(item.id)}">${item.active ? "下架" : "上架"}</button>
          </div>
        </article>
      `).join("");
    }

    async function loadMenu() {
      if (!dbReady) return;
      const { data, error } = await db.from("menu_items").select("*").order("sort_order", { ascending: true });
      if (error) {
        menuItemsEl.innerHTML = `<div class="panel empty">菜品表尚未创建：${escapeHtml(error.message)}</div>`;
        menuSummary.textContent = "菜品管理尚未初始化";
        return;
      }
      allMenuItems = data || [];
      renderMenu();
    }

    function resetMenuForm() {
      document.querySelector("#menuId").value = "";
      document.querySelector("#menuName").value = "";
      document.querySelector("#menuPrice").value = "";
      document.querySelector("#menuCategory").value = "skewer";
      document.querySelector("#menuSort").value = "100";
      document.querySelector("#menuIcon").value = "";
      document.querySelector("#menuBadge").value = "";
      document.querySelector("#menuDescription").value = "";
      menuForm.hidden = true;
    }

    function editMenuItem(id) {
      const item = allMenuItems.find(menuItem => menuItem.id === id);
      if (!item) return;
      document.querySelector("#menuId").value = item.id;
      document.querySelector("#menuName").value = item.name;
      document.querySelector("#menuPrice").value = Number(item.price || 0);
      document.querySelector("#menuCategory").value = item.category;
      document.querySelector("#menuSort").value = item.sort_order || 0;
      document.querySelector("#menuIcon").value = item.icon || "";
      document.querySelector("#menuBadge").value = item.badge || "";
      document.querySelector("#menuDescription").value = item.description || "";
      menuForm.hidden = false;
      menuForm.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function saveMenuItem() {
      const existingId = document.querySelector("#menuId").value;
      const name = document.querySelector("#menuName").value.trim();
      const price = Number(document.querySelector("#menuPrice").value);
      if (!name || !Number.isFinite(price) || price < 0) {
        showToast("请填写菜品名称和正确价格");
        return;
      }
      const oldItem = allMenuItems.find(item => item.id === existingId);
      const payload = {
        id: existingId || `dish-${Date.now()}`,
        name,
        price,
        category: document.querySelector("#menuCategory").value,
        sort_order: Number(document.querySelector("#menuSort").value || 100),
        icon: document.querySelector("#menuIcon").value.trim() || name.slice(0, 1),
        badge: document.querySelector("#menuBadge").value.trim(),
        description: document.querySelector("#menuDescription").value.trim(),
        active: oldItem ? oldItem.active : true
      };
      const { error } = await db.from("menu_items").upsert(payload);
      if (error) {
        showToast(`保存失败：${error.message}`);
        return;
      }
      resetMenuForm();
      await loadMenu();
      showToast("菜品已保存");
    }

    async function toggleMenuItem(id) {
      const item = allMenuItems.find(menuItem => menuItem.id === id);
      if (!item) return;
      const { error } = await db.from("menu_items").update({ active: !item.active }).eq("id", id);
      if (error) {
        showToast(`操作失败：${error.message}`);
        return;
      }
      item.active = !item.active;
      renderMenu();
      showToast(item.active ? "菜品已上架" : "菜品已下架");
    }

    function subscribe() {
      if (!dbReady) return;
      db.channel("orders-realtime")
        .on("postgres_changes", { event: "INSERT", schema: "public", table: "orders" }, payload => {
          if (allOrders.some(order => order.id === payload.new.id)) return;
          allOrders = [payload.new, ...allOrders];
          render();
          notifyNewOrder(payload.new.order_no);
        })
        .on("postgres_changes", { event: "UPDATE", schema: "public", table: "orders" }, payload => {
          allOrders = allOrders.map(order => order.id === payload.new.id ? payload.new : order);
          render();
        })
        .subscribe();
    }

    function startAutoRefresh() {
      if (refreshTimer) return;
      refreshTimer = window.setInterval(loadOrders, 5000);
    }

    document.querySelector("#loginBtn").addEventListener("click", () => {
      const pin = document.querySelector("#pin").value.trim();
      if (pin !== String(config.ADMIN_PIN || "")) {
        showToast("密码不对");
        return;
      }
      login.hidden = true;
      app.hidden = false;
      unlockSound();
      loadOrders();
      loadMenu();
      subscribe();
      startAutoRefresh();
    });

    document.querySelector("#refreshBtn").addEventListener("click", () => currentView === "orders" ? loadOrders() : loadMenu());
    document.querySelector("#soundBtn").addEventListener("click", event => {
      soundEnabled = !soundEnabled;
      event.target.textContent = soundEnabled ? "声音已开" : "开启声音";
      if (soundEnabled) {
        unlockSound();
        beep();
        speakNewOrder();
      }
    });

    document.querySelector("#filters").addEventListener("click", event => {
      const status = event.target.dataset.status;
      if (!status) return;
      currentStatus = status;
      document.querySelectorAll(".pill").forEach(button => button.classList.toggle("active", button.dataset.status === status));
      render();
    });

    ordersEl.addEventListener("click", event => {
      const id = event.target.dataset.id;
      const status = event.target.dataset.action;
      if (id && status) updateStatus(id, status);
    });

    document.querySelector("#mainTabs").addEventListener("click", event => {
      const view = event.target.dataset.view;
      if (!view) return;
      currentView = view;
      ordersView.hidden = view !== "orders";
      menuView.hidden = view !== "menu";
      document.querySelectorAll(".main-tab").forEach(button => button.classList.toggle("active", button.dataset.view === view));
      summary.textContent = view === "orders" ? `共 ${allOrders.length} 单，新订单 ${allOrders.filter(order => order.status === "new").length} 单` : "修改菜品后，小程序会读取最新菜单";
      if (view === "menu") loadMenu();
    });

    document.querySelector("#addMenuBtn").addEventListener("click", () => {
      resetMenuForm();
      menuForm.hidden = false;
    });
    document.querySelector("#cancelMenuBtn").addEventListener("click", resetMenuForm);
    document.querySelector("#saveMenuBtn").addEventListener("click", saveMenuItem);
    menuItemsEl.addEventListener("click", event => {
      const id = event.target.dataset.id;
      const action = event.target.dataset.menuAction;
      if (id && action === "edit") editMenuItem(id);
      if (id && action === "toggle") toggleMenuItem(id);
    });
  </script>
</body>
</html>
